<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FW Funk 2</title>

<style>

body{
    margin:0;
    background:#5e5e5e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.radio-container{
    position:relative;
    width:280px;
}

.radio-image{
    width:100%;
    display:block;
}

/* SPRECHTASTE */
.ptt-button{
    position:absolute;

    left:-8px;
    top:140px;

    width:28px;
    height:120px;

    background:transparent;
    border:none;
    
    cursor:pointer;
}

.ptt-button:hover{
    background:rgba(255,255,0,0.10);
}
    
 .ptt-button:active{
    background:rgba(255,255,0,0.15);
}
    
</style>
</head>
<body>

<div class="radio-container">

    <img src="funkgeraet2.png" class="radio-image">

    <button class="ptt-button" id="talkBtn"></button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script>

const socket = io();

const channelName = "polizei-funk";

socket.emit("join-channel", channelName);

const peers = {};

const radioSound =
    new Audio("/sounds/funksound.mp3");

let localStream;
let micTrack;

async function init(){

    localStream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    micTrack =
        localStream.getAudioTracks()[0];

    micTrack.enabled = false;

    socket.on("all-users", users => {

        users.forEach(userID => {

            const peer =
                createPeer(
                    userID,
                    socket.id,
                    localStream
                );

            peers[userID] = peer;
        });
    });

    socket.on("user-joined", payload => {

        const peer =
            addPeer(
                payload.signal,
                payload.callerID,
                localStream
            );

        peers[payload.callerID] = peer;
    });

    socket.on(
        "receiving-returned-signal",
        payload => {

            const peer = peers[payload.id];

            if(peer){

                peer.signal(payload.signal);
            }
        }
    );
}

init();

function createPeer(userToSignal, callerID, stream){

    const peer = new SimplePeer({
        initiator:true,
        trickle:false,
        stream:stream
    });

    peer.on("signal", signal => {

        socket.emit("sending-signal", {
            userToSignal,
            callerID,
            signal
        });
    });

    peer.on("stream", stream => {

        const audio = new Audio();

        audio.srcObject = stream;

        audio.play();
    });

    return peer;
}

function addPeer(incomingSignal, callerID, stream){

    const peer = new SimplePeer({
        initiator:false,
        trickle:false,
        stream:stream
    });

    peer.on("signal", signal => {

        socket.emit("returning-signal", {
            signal,
            callerID
        });
    });

    peer.on("stream", stream => {

        const audio = new Audio();

        audio.srcObject = stream;

        audio.play();
    });

    peer.signal(incomingSignal);

    return peer;
}

const talkBtn =
    document.getElementById("talkBtn");

talkBtn.addEventListener(
    "pointerdown",
    () => {

        radioSound.currentTime = 0;

        radioSound.play();

        if(micTrack){

            micTrack.enabled = true;
        }
    }
);

talkBtn.addEventListener(
    "pointerup",
    () => {

        if(micTrack){

            micTrack.enabled = false;
        }
    }
);

</script>

</body>
</html>
