<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FW Funk</title>

<style>

.hotkey-box{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    z-index:999;
}

.hotkey-box button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.hotkey-box p{
    margin-top:5px;
    font-size:14px;
}
    
body{
    margin:0;
    background:#5e5e5e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    user-select:none;
}

.radio-container{
    position:relative;
    width:280px;
}

.radio-image{
    width:100%;
    display:block;
}

/* UNSICHTBARE SPRECHTASTE */
.ptt-button{
    position:absolute;

    left:-8px;
    top:440px;

    width:28px;
    height:120px;

    background:transparent;
    border:none;
    cursor:pointer;
}

.ptt-button:hover{
    background:rgba(255,255,0,0.10);
}
    
/* Optional beim Drücken */
.ptt-button:active{
    background:rgba(255,255,0,0.15);
}

</style>
</head>
<body>

<div class="hotkey-box">

    <button id="setHotkeyBtn">
        🎮 Hotkey festlegen
    </button>

    <p id="hotkeyDisplay">
        Hotkey: keiner
    </p>

</div>
    
<div class="radio-container">

    <img src="funkgeraet.png" class="radio-image">

    <button class="ptt-button" id="talkBtn"></button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script>

const socket = io();

socket.emit("join-channel", "314f");

document.addEventListener("keydown", e => {

    if(!hotkey) return;

    if(e.key.toLowerCase() === hotkey &&
       !isTalking){

        isTalking = true;

        radioSound.currentTime = 0;
        radioSound.play();

        socket.emit("radio-start");

        if(mediaRecorder &&
           mediaRecorder.state !== "recording"){

            mediaRecorder.start();
        }
    }
});

document.addEventListener("keyup", e => {

    if(!hotkey) return;

    if(e.key.toLowerCase() === hotkey){

        isTalking = false;

        if(mediaRecorder &&
           mediaRecorder.state === "recording"){

            mediaRecorder.stop();
        }
    }
});

const peers = {};

const socket = io();

const channelName = "fw-funk";
/* funk2.html:
const channelName = "polizei-funk";
*/

socket.emit("join-channel", channelName);

let localStream;

const radioSound =
    new Audio("/sounds/funksound.mp3");

async function init(){

    localStream =
        await navigator.mediaDevices.getUserMedia({
            audio:true
        });

    socket.on("all-users", users => {

        users.forEach(userID => {

            const peer =
                createPeer(userID, socket.id, localStream);

            peers[userID] = peer;
        });
    });

    socket.on("user-joined", payload => {

        const peer =
            addPeer(
                payload.signal,
                payload.callerID,
                localStream
            );

        peers[payload.callerID] = peer;
    });

    socket.on(
        "receiving-returned-signal",
        payload => {

            const item = peers[payload.id];

            item.signal(payload.signal);
        }
    );
}

init();

function createPeer(userToSignal, callerID, stream){

    const peer = new SimplePeer({
        initiator:true,
        trickle:false,
        stream:stream
    });

    peer.on("signal", signal => {

        socket.emit("sending-signal", {
            userToSignal,
            callerID,
            signal
        });
    });

    peer.on("stream", stream => {

        const audio = new Audio();

        audio.srcObject = stream;

        audio.play();
    });

    return peer;
}

function addPeer(incomingSignal, callerID, stream){

    const peer = new SimplePeer({
        initiator:false,
        trickle:false,
        stream:stream
    });

    peer.on("signal", signal => {

        socket.emit("returning-signal", {
            signal,
            callerID
        });
    });

    peer.on("stream", stream => {

        const audio = new Audio();

        audio.srcObject = stream;

        audio.play();
    });

    peer.signal(incomingSignal);

    return peer;
}

localStreamPromise = navigator.mediaDevices
.getUserMedia({audio:true});

let micTrack;

localStreamPromise.then(stream => {

    micTrack = stream.getAudioTracks()[0];

    micTrack.enabled = false;
});

const talkBtn =
    document.getElementById("talkBtn");

talkBtn.addEventListener("pointerdown", () => {

    radioSound.currentTime = 0;

    radioSound.play();

    if(micTrack){

        micTrack.enabled = true;
    }
});

talkBtn.addEventListener("pointerup", () => {

    if(micTrack){

        micTrack.enabled = false;
    }
});
    
</script>

</body>
</html>
