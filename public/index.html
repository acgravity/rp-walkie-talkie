<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>RP Walkie Talkie</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:50px;
}

.container{
    width:300px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:15px;
}

input, button, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#00aa44;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:active{
    background:#007733;
}
</style>
</head>
<body>

<div class="container">
    <h1>📻 Walkie Talkie</h1>

    <input type="text" id="name" placeholder="Dein Name">

    <select id="channel">
        <option value="police">Polizei</option>
        <option value="ems">EMS</option>
        <option value="civil">Zivil</option>
    </select>

    <button id="joinBtn">Kanal verbinden</button>

    <button id="talkBtn">🎤 Zum Sprechen halten</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let mediaRecorder;
let audioChunks = [];

document.getElementById("joinBtn").onclick = async () => {

    const channel = document.getElementById("channel").value;

    socket.emit("join-channel", channel);

    const stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {

        const blob = new Blob(audioChunks, {
            type:"audio/webm"
        });

        audioChunks = [];

        const reader = new FileReader();

        reader.onloadend = () => {
            socket.emit("voice", reader.result);
        };

        reader.readAsDataURL(blob);
    };
};

const talkBtn = document.getElementById("talkBtn");

const radioSound = new Audio("/sounds/funksound.mp3");

talkBtn.addEventListener("pointerdown", async () => {

    radioSound.currentTime = 0;
    radioSound.play();

    if(mediaRecorder){
        mediaRecorder.start();
    }
});

talkBtn.addEventListener("pointerup", () => {

    if(mediaRecorder){
        mediaRecorder.stop();
    }

});

socket.on("voice", data => {

    const audio = new Audio(data);

    audio.play();
});
</script>

</body>
</html>
