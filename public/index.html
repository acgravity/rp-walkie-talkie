<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FW Funk</title>

<style>

.hotkey-box{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    z-index:999;
}

.hotkey-box button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.hotkey-box p{
    margin-top:5px;
    font-size:14px;
}
    
body{
    margin:0;
    background:#5e5e5e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    user-select:none;
}

.radio-container{
    position:relative;
    width:280px;
}

.radio-image{
    width:100%;
    display:block;
}

/* UNSICHTBARE SPRECHTASTE */
.ptt-button{
    position:absolute;

    left:-8px;
    top:440px;

    width:28px;
    height:120px;

    background:transparent;
    border:none;
    cursor:pointer;
}

.ptt-button:hover{
    background:rgba(255,255,0,0.10);
}
    
/* Optional beim Drücken */
.ptt-button:active{
    background:rgba(255,255,0,0.15);
}

</style>
</head>
<body>

<div class="hotkey-box">

    <button id="setHotkeyBtn">
        🎮 Hotkey festlegen
    </button>

    <p id="hotkeyDisplay">
        Hotkey: keiner
    </p>

</div>
    
<div class="radio-container">

    <img src="funkgeraet.png" class="radio-image">

    <button class="ptt-button" id="talkBtn"></button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>

<script>

const socket = io();

socket.emit("join-channel", "314f");

document.addEventListener("keydown", e => {

    if(!hotkey) return;

    if(e.key.toLowerCase() === hotkey &&
       !isTalking){

        isTalking = true;

        radioSound.currentTime = 0;
        radioSound.play();

        socket.emit("radio-start");

        if(mediaRecorder &&
           mediaRecorder.state !== "recording"){

            mediaRecorder.start();
        }
    }
});

document.addEventListener("keyup", e => {

    if(!hotkey) return;

    if(e.key.toLowerCase() === hotkey){

        isTalking = false;

        if(mediaRecorder &&
           mediaRecorder.state === "recording"){

            mediaRecorder.stop();
        }
    }
});
    
</script>

</body>
</html>
