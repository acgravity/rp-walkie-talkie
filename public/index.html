<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FW Funk</title>

<style>

.hotkey-box{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    font-family:Arial;
    z-index:999;
}

.hotkey-box button{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.hotkey-box p{
    margin-top:5px;
    font-size:14px;
}
    
body{
    margin:0;
    background:#5e5e5e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    user-select:none;
}

.radio-container{
    position:relative;
    width:280px;
}

.radio-image{
    width:100%;
    display:block;
}

/* UNSICHTBARE SPRECHTASTE */
.ptt-button{
    position:absolute;

    left:-8px;
    top:440px;

    width:28px;
    height:120px;

    background:transparent;
    border:none;
    cursor:pointer;
}

.ptt-button:hover{
    background:rgba(255,255,0,0.10);
}
    
/* Optional beim Drücken */
.ptt-button:active{
    background:rgba(255,255,0,0.15);
}

</style>
</head>
<body>

<div class="hotkey-box">

    <button id="setHotkeyBtn">
        🎮 Hotkey festlegen
    </button>

    <p id="hotkeyDisplay">
        Hotkey: keiner
    </p>

</div>
    
<div class="radio-container">

    <img src="funkgeraet.png" class="radio-image">

    <button class="ptt-button" id="talkBtn"></button>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

socket.emit("join-channel", "314f");

let mediaRecorder;
let audioChunks = [];

const radioSound = new Audio("/sounds/funksound.mp3");

async function initMic(){

    const stream = await navigator.mediaDevices.getUserMedia({
        audio:true
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        audioChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {

        const blob = new Blob(audioChunks,{
            type:"audio/webm"
        });

        audioChunks = [];

        const reader = new FileReader();

        reader.onloadend = () => {
            socket.emit("voice", reader.result);
        };

        reader.readAsDataURL(blob);
    };
}

initMic();

const STORAGE_KEY = "funk_hotkey_1";

let hotkey = localStorage.getItem(STORAGE_KEY);

const hotkeyDisplay = document.getElementById("hotkeyDisplay");
const setHotkeyBtn = document.getElementById("setHotkeyBtn");

if(hotkey){
    hotkeyDisplay.innerText = "Hotkey: " + hotkey.toUpperCase();
}

setHotkeyBtn.onclick = () => {

    hotkeyDisplay.innerText = "Taste drücken...";

    function keyListener(e){

        hotkey = e.key.toLowerCase();

        localStorage.setItem(STORAGE_KEY, hotkey);

        hotkeyDisplay.innerText =
            "Hotkey: " + hotkey.toUpperCase();

        document.removeEventListener("keydown", keyListener);
    }

    document.addEventListener("keydown", keyListener);
};
    
const talkBtn = document.getElementById("talkBtn");

talkBtn.addEventListener("pointerdown", async () => {

    radioSound.currentTime = 0;
    radioSound.play();

    socket.emit("radio-start");

    if(mediaRecorder &&
       mediaRecorder.state !== "recording"){

        mediaRecorder.start();
    }
});

talkBtn.addEventListener("pointerup", () => {

    if(mediaRecorder &&
       mediaRecorder.state === "recording"){

        mediaRecorder.stop();
    }
});

socket.on("radio-start", () => {

    const startSound = new Audio("/sounds/funksound.mp3");

    startSound.play();
});
    
socket.on("voice", data => {

    const audio = new Audio(data);

    audio.play();
});

</script>

</body>
</html>
